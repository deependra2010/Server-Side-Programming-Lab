<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Text Formatting</title>
</head>

<body>
    <h2>Formatting Demonstrations</h2>
    <p><b>Bold Text:</b> This is important.</p>
    <p><i>Italic Text:</b> This is emphasized.</p>
    <p><u>Underline Text:</b> This is underlined.</p>

    <h3>Mathematical & Chemical Formulas</h3>
    <p>Algebraic Equation: X<sup>2</sup> + Y<sup>2</sup> = Z<sup>2</sup></p>
    <p>Water Formula: H<sub>2</sub>O</p>
</body>

</html>
