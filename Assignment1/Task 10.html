<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Personal Portfolio</title>
    <style>
        .profile-card {
            border: 2px solid #333;
            padding: 20px;
            max-width: 400px;
            background-color: #fafafa;
            border-radius: 8px;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
        }

        .role {
            font-weight: bold;
            color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="profile-card">
        <h1>Deependra Kumar</h1>
        <p class="role">B.Tech Student</p>
        <hr>
        <h3>Technical Skills</h3>
        <p>Skills: HTML, CSS, JavaScript</p>
    </div>
</body>

</html>
